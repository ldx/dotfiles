# Minimal Hyprlock config.
# Uses a blurred screenshot background and a centered password field.

$font = CommitMonoNerdFontMono

general {
    hide_cursor = false
}

animations {
    enabled = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 420, 70
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    fade_on_empty = false
    placeholder_text = Password...
    fail_text = $PAMFAIL
    font_family = $font
    font_color = rgb(eeeeee)
    inner_color = rgba(00000099)
    outer_color = rgba(888888ff)
    check_color = rgba(88c0d0ff)
    fail_color = rgba(bf616aff)
    rounding = 10
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = $font
    color = rgba(eeeeeeff)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %Y-%m-%d"
    font_size = 22
    font_family = $font
    color = rgba(eeeeeecc)
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[hu]
    font_size = 18
    font_family = $font
    color = rgba(eeeeeeaa)
    position = 0, -130
    halign = center
    valign = center
}
