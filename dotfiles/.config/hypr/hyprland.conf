# Minimal first-run Hyprland config for Debian trixie-backports.
# Goal: keep Sway intact, provide familiar basics, and start on master layout.

$mod = SUPER
$terminal = alacritty
$launcher = fuzzel

monitor = , preferred, auto, 1

# Environment for common Wayland-native app behavior.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Startup
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user restart xdg-desktop-portal.service xdg-desktop-portal-hyprland.service
exec-once = /usr/libexec/hyprpolkitagent
exec-once = sh -c 'pkill -x hyprpaper 2>/dev/null || true; hyprpaper'
exec-once = sh -c 'pkill -x hypridle 2>/dev/null || true; hypridle'
exec-once = waybar -c ~/.config/waybar/config-hyprland
exec-once = sh -c 'systemctl --user stop swaync.service 2>/dev/null || true; pkill -x swaync-client 2>/dev/null || true; pkill -x swaync 2>/dev/null || true; pgrep -x mako >/dev/null || mako'
exec-once = sh -c 'pgrep -x copyq || copyq'
exec-once = sh -c 'pgrep -x nm-applet || nm-applet --indicator'
exec-once = sh -c 'pgrep -x blueman-applet || blueman-applet'
exec-once = sh -c 'pgrep -x udiskie || udiskie --tray'
exec-once = sh -c 'sleep 2; [ -x "$HOME/.dropbox-dist/dropboxd" ] && (pgrep -x dropbox || env XDG_CURRENT_DESKTOP=Unity DESKTOP_SESSION=Unity "$HOME/.dropbox-dist/dropboxd")'
exec-once = sh -c 'sleep 2; [ -x /opt/1Password/1password ] && (pgrep -f "^/opt/1Password/1password" || env XDG_CURRENT_DESKTOP=Unity DESKTOP_SESSION=Unity /opt/1Password/1password --silent)'
exec-once = sh -c 'pgrep -x pasystray || pasystray'

general {
    layout = master
    gaps_in = 4
    gaps_out = 8
    border_size = 2
}

input {
    kb_model = pc105
    kb_layout = hu
    follow_mouse = 1
    natural_scroll = false
    touchpad {
        natural_scroll = false
    }
}

decoration {
    rounding = 6
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Keyboard shortcuts -- mirrors the Sway/XMonad bindings where Hyprland has an equivalent.

# Terminal (Mod+Shift+Return matches Sway/XMonad)
bind = $mod SHIFT, Return, exec, $terminal

# Kill focused window (Mod+Shift+c matches Sway/XMonad)
bind = $mod SHIFT, C, killactive

# App launcher (Mod+p matches Sway/XMonad; fuzzel replaces wofi for Hyprland)
bind = $mod, P, exec, $launcher

# Reload config / exit compositor
bind = $mod, Q, exec, hyprctl reload
bind = $mod SHIFT, Q, exit

# Focus monitor (matching Sway/XMonad Mod+w/e)
bind = $mod, W, focusmonitor, l
bind = $mod, E, focusmonitor, r

# Focus windows (vim-style + arrows)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Resize mode (matching Sway/XMonad entry key Mod+r)
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -50 0
binde = , J, resizeactive, 0 50
binde = , K, resizeactive, 0 -50
binde = , L, resizeactive, 50 0
binde = , Left, resizeactive, -50 0
binde = , Down, resizeactive, 0 50
binde = , Up, resizeactive, 0 -50
binde = , Right, resizeactive, 50 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, R, submap, reset
submap = reset

# Layout/floating/fullscreen
# Sway's Mod+Space cycles split/tabbed layouts. Hyprland master has no direct equivalent.
bind = $mod SHIFT, Space, togglefloating
bind = $mod, F, fullscreen

# Workspaces 1-9, matching Sway.
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Lock and suspend (matching Sway/XMonad)
bind = $mod SHIFT, O, exec, ~/.local/bin/screen-lock
bind = $mod SHIFT, S, exec, sh -c '~/.local/bin/screen-lock --1password-only; systemctl suspend'

# Screenshots (matching Sway)
bind = , Print, exec, sh -c 'f="$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"; mkdir -p "$HOME/Pictures"; grim "$f" && wl-copy -t image/png < "$f"'
bind = CTRL, Print, exec, sh -c 'f="$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"; mkdir -p "$HOME/Pictures"; grim -g "$(slurp)" "$f" && wl-copy -t image/png < "$f"'

# Audio (same as Sway/XMonad)
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Brightness (same as Sway/XMonad)
bind = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness-control down
bind = , XF86MonBrightnessUp, exec, ~/.local/bin/brightness-control up

# Mouse move/resize with Mod, similar to Sway floating_modifier.
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
