# Hypridle config -- mirrors Sway idle behavior.
# - Lock after 5 minutes.
# - Turn displays off after 10 minutes.
# - Lock before sleep.

general {
    lock_cmd = ~/.local/bin/screen-lock
    before_sleep_cmd = ~/.local/bin/screen-lock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = ~/.local/bin/screen-lock
}

listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
