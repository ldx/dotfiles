[settings]
idiomatic_version_file_enable_tools = []

[tools]
node = "lts"
go = "1"
fzf = "latest"
amazon-ecr-credential-helper = "latest"
argocd = "latest"
aws-cli = "latest"
aws-iam-authenticator = "latest"
azure-kubelogin = "latest"
bazelisk = "latest"
claude = "latest"
codex = "latest"
neovim = "latest"
docker-cli = "latest"
docker-compose = "latest"
evans = "latest"
fd = "latest"
gcloud = "latest"
github-cli = "latest"
helm = "latest"
jq = "latest"
jwt = "latest"
kafkactl = "latest"
kubeconform = "latest"
kubectl = "latest"
# Use npm backend: aqua currently looks for pnpm-linux-x64 without the .tar.gz suffix.
"npm:pnpm" = "latest"
postgres = "latest"
regctl = "latest"
regsync = "latest"
ripgrep = "latest"
starship = "latest"
rust = "latest"
# Pin temporal: v1.30.4.1 is currently selected as latest by mise/aqua but has no Linux assets.
temporal = "1.31.0"
terraform = "latest"
bun = "latest"
sops = "latest"
"npm:agent-browser" = "latest"
"npm:opencode-ai" = "latest"
pipx = "latest"
azure-cli = "latest"
uv = "latest"
zellij = "latest"
"github:googleworkspace/cli" = { version = "latest", exe = "gws" }
"github:DataDog/pup" = "latest"
"github:schpet/linear-cli" = { version = "latest", exe = "linear" }
"github:open-cli-collective/slack-chat-api" = { version = "latest", asset_pattern = "slck_v*_linux_amd64.tar.gz" }
"github:1broseidon/ketch" = "latest"
"npm:ntn" = "latest"
"npm:wrangler" = "latest"
"github:render-oss/cli" = { version = "latest", rename_exe = "render" }

[env]
DD_SITE = "us3.datadoghq.com"
